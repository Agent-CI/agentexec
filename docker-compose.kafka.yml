# Kafka development environment for running integration tests locally.
#
# Usage:
#   docker compose -f docker-compose.kafka.yml up -d
#
#   KAFKA_BOOTSTRAP_SERVERS=localhost:9092 \
#   AGENTEXEC_STATE_BACKEND=agentexec.state.kafka_backend \
#   uv run pytest tests/test_kafka_integration.py -v
#
#   docker compose -f docker-compose.kafka.yml down

services:
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:

      # -----------------------------------------------------------------
      # Standard Kafka / KRaft bootstrap
      #
      # Boilerplate for running a single-node Kafka broker in KRaft mode
      # (no Zookeeper). Any single-node Kafka setup looks like this.
      # -----------------------------------------------------------------

      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "agentexec-dev-cluster-01"

      # Single-node requires replication factor 1 for internal topics.
      # In production (multi-broker), remove these — the defaults (3) are correct.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"


    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 15s
