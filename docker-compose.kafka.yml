# Kafka development environment for running integration tests locally.
#
# Usage:
#   docker compose -f docker-compose.kafka.yml up -d
#
#   KAFKA_BOOTSTRAP_SERVERS=localhost:9092 \
#   AGENTEXEC_STATE_BACKEND=agentexec.state.kafka_backend \
#   uv run pytest tests/test_kafka_integration.py -v
#
#   docker compose -f docker-compose.kafka.yml down

services:
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topic defaults
      KAFKA_NUM_PARTITIONS: "2"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Faster compaction for development
      KAFKA_LOG_CLEANER_MIN_COMPACTION_LAG_MS: "0"
      KAFKA_LOG_CLEANER_MIN_CLEANABLE_RATIO: "0.01"
      KAFKA_LOG_RETENTION_MS: "60000"
      # Fast consumer group joins
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      # Cluster ID
      CLUSTER_ID: "agentexec-dev-cluster-01"
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 15s
