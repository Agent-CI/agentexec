name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Unit tests — no external services (fakeredis + SQLite)
  # -----------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_kafka_integration.py \
            -o "addopts=" \
            -q --tb=short
        env:
          REDIS_URL: "redis://localhost:6379"

  # -----------------------------------------------------------------------
  # Kafka integration tests — real broker via Docker service
  # -----------------------------------------------------------------------
  test-kafka:
    runs-on: ubuntu-latest

    services:
      kafka:
        image: bitnami/kafka:3.7
        ports:
          - 9092:9092
        env:
          # KRaft mode (no Zookeeper)
          KAFKA_CFG_NODE_ID: "1"
          KAFKA_CFG_PROCESS_ROLES: broker,controller
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          # Listeners: PLAINTEXT for clients, CONTROLLER for raft
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          # Faster compaction for tests
          KAFKA_CFG_LOG_CLEANER_MIN_COMPACTION_LAG_MS: "0"
          KAFKA_CFG_LOG_CLEANER_MIN_CLEANABLE_RATIO: "0.01"
          # Short retention for non-compacted topics
          KAFKA_CFG_LOG_RETENTION_MS: "60000"
          # Single partition by default (tests create topics explicitly)
          KAFKA_CFG_NUM_PARTITIONS: "1"
          # Allow auto topic creation for convenience
          KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
        options: >-
          --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --extra kafka

      - name: Wait for Kafka to be ready
        run: |
          echo "Waiting for Kafka..."
          for i in $(seq 1 30); do
            if nc -z localhost 9092 2>/dev/null; then
              echo "Kafka port is open"
              sleep 5
              echo "Kafka is ready"
              exit 0
            fi
            echo "  attempt $i/30..."
            sleep 2
          done
          echo "Kafka failed to start"
          exit 1

      - name: Run Kafka integration tests
        run: |
          uv run pytest tests/test_kafka_integration.py \
            -o "addopts=" \
            -v --tb=short
        env:
          AGENTEXEC_STATE_BACKEND: agentexec.state.kafka_backend
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          AGENTEXEC_KAFKA_DEFAULT_PARTITIONS: "2"
          AGENTEXEC_KAFKA_REPLICATION_FACTOR: "1"
