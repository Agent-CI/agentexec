name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Unit tests — no external services (fakeredis + SQLite)
  # -----------------------------------------------------------------------

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_kafka_integration.py \
            -o "addopts=" \
            -v --tb=long

  # -----------------------------------------------------------------------
  # Kafka integration tests — real broker via Docker service
  # -----------------------------------------------------------------------
  test-kafka:
    runs-on: ubuntu-latest

    services:
      kafka:
        image: apache/kafka:3.9.2
        ports:
          - 9092:9092
        env:
          # KRaft mode (default for apache/kafka)
          KAFKA_NODE_ID: "1"
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          # Listeners
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          # Faster compaction for tests
          KAFKA_LOG_CLEANER_MIN_COMPACTION_LAG_MS: "0"
          KAFKA_LOG_CLEANER_MIN_CLEANABLE_RATIO: "0.01"
          # Short retention for non-compacted topics
          KAFKA_LOG_RETENTION_MS: "60000"
          # Single partition by default
          KAFKA_NUM_PARTITIONS: "1"
          # Allow auto topic creation
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          # Fast consumer group rebalancing for tests
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
          # Cluster ID for KRaft
          CLUSTER_ID: "ciTestCluster0001"
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --extra kafka

      - name: Wait for Kafka to be ready
        run: |
          echo "Waiting for Kafka..."
          for i in $(seq 1 30); do
            if nc -z localhost 9092 2>/dev/null; then
              echo "Kafka port is open"
              sleep 5
              echo "Kafka is ready"
              exit 0
            fi
            echo "  attempt $i/30..."
            sleep 2
          done
          echo "Kafka failed to start"
          exit 1

      - name: Run Kafka integration tests
        run: |
          uv run pytest tests/test_kafka_integration.py \
            -o "addopts=" \
            -v --tb=long 2>&1 | tee /tmp/kafka_test_output.txt
          exit ${PIPESTATUS[0]}
        env:
          AGENTEXEC_STATE_BACKEND: agentexec.state.kafka_backend
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          AGENTEXEC_KAFKA_DEFAULT_PARTITIONS: "2"
          AGENTEXEC_KAFKA_REPLICATION_FACTOR: "1"

      - name: Show test output on failure
        if: failure()
        run: |
          echo "=== KAFKA TEST OUTPUT ==="
          cat /tmp/kafka_test_output.txt
          echo "=== END OUTPUT ==="

      - name: Create failure check annotation with output
        if: failure()
        run: |
          # Emit ONLY debug/failure lines (not PASSED) as annotations
          grep -E '\[queue_|FAILED|ERROR|AssertionError|TIMEOUT|short test summary' /tmp/kafka_test_output.txt | tail -9 | while IFS= read -r line; do
            echo "::warning::$line"
          done
